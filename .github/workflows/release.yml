name: Release

on:
  push:
    tags:
      - 'v*.*.*'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

permissions:
  contents: write
  packages: write

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Node dependencies
        run: npm ci

      - name: Build CSS
        run: npm run build:css

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache: true

      - name: Run tests
        run: go test -v ./...

      - name: Run AD-like functional compatibility tests
        run: make test-functional

  build-binaries:
    name: Build Release Binaries
    needs: test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            binary: ldaplite-linux-amd64
            archive: ldaplite-linux-amd64.tar.gz
          - goos: linux
            goarch: arm64
            binary: ldaplite-linux-arm64
            archive: ldaplite-linux-arm64.tar.gz
          - goos: darwin
            goarch: amd64
            binary: ldaplite-darwin-amd64
            archive: ldaplite-darwin-amd64.tar.gz
          - goos: darwin
            goarch: arm64
            binary: ldaplite-darwin-arm64
            archive: ldaplite-darwin-arm64.tar.gz
          - goos: windows
            goarch: amd64
            binary: ldaplite-windows-amd64.exe
            archive: ldaplite-windows-amd64.zip
          - goos: windows
            goarch: arm64
            binary: ldaplite-windows-arm64.exe
            archive: ldaplite-windows-arm64.zip

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Node dependencies
        run: npm ci

      - name: Build CSS
        run: npm run build:css

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache: true

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          go build -ldflags="-s -w -X main.version=${{ steps.version.outputs.VERSION }}" \
            -o ${{ matrix.binary }} \
            ./cmd/ldaplite

      - name: Create Unix archive
        if: matrix.goos != 'windows'
        run: |
          tar -czf ${{ matrix.archive }} \
            ${{ matrix.binary }} \
            README.md \
            QUICKSTART.md

      - name: Create Windows archive
        if: matrix.goos == 'windows'
        run: |
          zip ${{ matrix.archive }} \
            ${{ matrix.binary }} \
            README.md \
            QUICKSTART.md

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.archive }}
          path: ${{ matrix.archive }}

  build-docker:
    name: Build and Push Docker Image
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.version.outputs.VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  create-release:
    name: Create GitHub Release
    needs: [build-binaries, build-docker]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Extract changelog section
        run: |
          extract_section() {
            local heading="$1"
            awk -v heading="$heading" '
              /^## / {
                if (capture) {
                  exit
                }
                if ($0 == heading || index($0, heading " ") == 1) {
                  capture = 1
                  found = 1
                  next
                }
              }
              capture {
                print
              }
              END {
                exit found ? 0 : 1
              }
            ' CHANGELOG.md
          }

          if extract_section "## ${{ steps.version.outputs.VERSION }}" > changelog_notes.md && [ -s changelog_notes.md ]; then
            echo "Using CHANGELOG.md section for ${{ steps.version.outputs.VERSION }}"
          elif extract_section "## Unreleased" > changelog_notes.md && [ -s changelog_notes.md ]; then
            echo "Using CHANGELOG.md Unreleased section"
          else
            echo "No CHANGELOG.md section found for ${{ steps.version.outputs.VERSION }} or Unreleased" >&2
            exit 1
          fi

      - name: Generate release notes
        id: release_notes
        run: |
          cat > release_notes.md << 'EOF'
          ## ldaplite ${{ steps.version.outputs.VERSION }}

          ### Docker Images

          Multi-architecture Docker images are available:

          ```bash
          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.VERSION }}
          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          ```

          Supported architectures:
          - `linux/amd64`
          - `linux/arm64`

          ### Binaries

          Pre-built binaries are attached to this release:
          - `ldaplite-linux-amd64.tar.gz` - Intel/AMD 64-bit
          - `ldaplite-linux-arm64.tar.gz` - Linux ARM 64-bit
          - `ldaplite-darwin-amd64.tar.gz` - macOS Intel
          - `ldaplite-darwin-arm64.tar.gz` - macOS Apple Silicon
          - `ldaplite-windows-amd64.zip` - Windows Intel/AMD 64-bit
          - `ldaplite-windows-arm64.zip` - Windows ARM 64-bit

          ### Installation

          Download and extract the binary for your architecture:

          ```bash
          # For AMD64
          wget https://github.com/${{ github.repository }}/releases/download/${{ steps.version.outputs.VERSION }}/ldaplite-linux-amd64.tar.gz
          tar -xzf ldaplite-linux-amd64.tar.gz
          chmod +x ldaplite-linux-amd64
          ./ldaplite-linux-amd64 version

          # For ARM64
          wget https://github.com/${{ github.repository }}/releases/download/${{ steps.version.outputs.VERSION }}/ldaplite-linux-arm64.tar.gz
          tar -xzf ldaplite-linux-arm64.tar.gz
          chmod +x ldaplite-linux-arm64
          ./ldaplite-linux-arm64 version

          # For macOS Apple Silicon
          curl -LO https://github.com/${{ github.repository }}/releases/download/${{ steps.version.outputs.VERSION }}/ldaplite-darwin-arm64.tar.gz
          tar -xzf ldaplite-darwin-arm64.tar.gz
          chmod +x ldaplite-darwin-arm64
          ./ldaplite-darwin-arm64 version
          ```

          For Windows, download the matching `.zip`, extract it, and run `ldaplite-windows-amd64.exe version` or `ldaplite-windows-arm64.exe version`.

          ## Changes
          EOF

          cat changelog_notes.md >> release_notes.md

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          name: Release ${{ steps.version.outputs.VERSION }}
          body_path: release_notes.md
          draft: false
          prerelease: false
          files: |
            artifacts/ldaplite-linux-amd64.tar.gz/ldaplite-linux-amd64.tar.gz
            artifacts/ldaplite-linux-arm64.tar.gz/ldaplite-linux-arm64.tar.gz
            artifacts/ldaplite-darwin-amd64.tar.gz/ldaplite-darwin-amd64.tar.gz
            artifacts/ldaplite-darwin-arm64.tar.gz/ldaplite-darwin-arm64.tar.gz
            artifacts/ldaplite-windows-amd64.zip/ldaplite-windows-amd64.zip
            artifacts/ldaplite-windows-arm64.zip/ldaplite-windows-arm64.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
